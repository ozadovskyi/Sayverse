<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }} | Sayverse</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="Sayverse">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  {% if page.url == "/privacy/" %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Privacy Policy",
    "url": "https://sayverse.app/privacy/",
    "description": "Sayverse privacy policy — what data is sent to OpenAI, what is stored, and your rights under GDPR and CCPA.",
    "isPartOf": {
      "@type": "WebSite",
      "name": "Sayverse",
      "url": "https://sayverse.app/"
    },
    "publisher": {
      "@type": "Person",
      "name": "Andrii Ozadovskyi"
    },
    "datePublished": "2026-05-26",
    "dateModified": "2026-05-26"
  }
  </script>
  {% endif %}

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-input: #1a1a2e;
      --fg: #e0e0e0;
      --fg-muted: #7f8c9b;
      --fg-faint: #4a5568;
      --neon: #00fff0;
      --neon-soft: rgba(0, 255, 240, 0.15);
      --neon-line: rgba(0, 255, 240, 0.2);
      --danger: #ff0055;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Flex column on the body so the footer can be pinned to the
       viewport bottom when the page content is short (e.g. the index
       landing). Without this the footer floats up against the content
       and the rest of the viewport reads as a blank void on mobile. */
    body {
      min-height: 100vh;
      min-height: 100dvh; /* iOS Safari: account for URL bar collapse */
      display: flex;
      flex-direction: column;
    }

    /* Tron-ish faint grid in the page background — decorative, low alpha. */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 255, 240, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 240, 0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    .page {
      position: relative;
      z-index: 1;
      flex: 1;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px 32px;
      display: flex;
      flex-direction: column;
    }
    /* Push the footer to the bottom of the viewport when the page is
       short (landing). On long pages (privacy) it sits naturally below
       the content. */
    .footer { margin-top: auto; }

    /* Wordmark — "Say" white + "verse" neon, matching the app. */
    .wordmark {
      display: inline-block;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--fg);
      text-decoration: none;
    }
    .wordmark .accent { color: var(--neon); }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--neon-line);
    }

    /* Neon comet across the top — bright head + quadratic fade tail,
       mirroring the in-app EdgeTrail (16s idle period, ~28% of the run
       length). Implemented as a CSS translateX animation across an
       overflow-hidden track, with the comet itself being a 28%-wide
       linear-gradient. CSS rather than SVG SMIL <animate> because SMIL
       is deprecated in Chrome and inconsistently supported on mobile
       Safari (the SMIL version did not animate on iOS in the wild). */
    .trail {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }
    .comet {
      position: absolute;
      top: 1px;
      left: 0;
      width: 28%;
      height: 2.5px;
      border-radius: 999px;
      /* Tail (transparent) → head (bright neon). Stops mirror the
         EdgeTrail's headOpacity * pow(1 - i/N, 1.6) curve. */
      background: linear-gradient(
        to right,
        rgba(0, 255, 240, 0)    0%,
        rgba(0, 255, 240, 0.08) 40%,
        rgba(0, 255, 240, 0.22) 65%,
        rgba(0, 255, 240, 0.45) 82%,
        rgba(0, 255, 240, 0.72) 93%,
        rgba(0, 255, 240, 0.95) 100%
      );
      /* Box-shadow not filter:drop-shadow — drop-shadow is CPU-rendered
         on WebKit and is a documented antipattern for moving elements
         on mobile Safari (the previous version did not animate on
         iPhone). Box-shadow stays on the GPU compositor. */
      box-shadow: 0 0 4px var(--neon), 0 0 10px rgba(0, 255, 240, 0.55);
      /* translate3d, not translateX — Safari only promotes the element
         to a GPU layer for 3D-transformed elements; plain 2D transforms
         can be left on the CPU path and never animate. */
      transform: translate3d(-100%, 0, 0);
      animation: comet-run 16s linear infinite;
      will-change: transform;
      backface-visibility: hidden;
    }
    @keyframes comet-run {
      from { transform: translate3d(-100%, 0, 0); }
      to   { transform: translate3d(100vw, 0, 0); }
    }
    /* Respect Reduce Motion but still show *something* — a faint
       static stripe instead of an invisible 0-opacity stub. */
    @media (prefers-reduced-motion: reduce) {
      .comet {
        animation: none;
        transform: none;
        width: 100%;
        opacity: 0.4;
      }
    }
    .nav-links {
      display: flex;
      gap: 18px;
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .nav-links a {
      color: var(--fg-muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .nav-links a:hover { color: var(--neon); }

    h1 {
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--neon);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin: 0 0 28px;
      text-shadow: 0 0 18px rgba(0, 255, 240, 0.35);
    }

    h2 {
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--neon);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 44px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--neon-line);
    }

    h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--fg);
      margin: 28px 0 10px;
    }

    p, ul, ol { margin: 0 0 16px; color: var(--fg); }
    ul, ol { padding-left: 22px; }
    li { margin-bottom: 6px; }
    li::marker { color: var(--neon); }

    strong { color: var(--fg); font-weight: 600; }

    a {
      color: var(--neon);
      text-decoration: none;
      border-bottom: 1px solid var(--neon-line);
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    a:hover {
      border-bottom-color: var(--neon);
      color: var(--neon);
    }

    code {
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 0.92em;
      background: var(--surface-input);
      color: var(--neon);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--neon-line);
    }

    /* The "At a glance" intro block — the first bullet list after the
       effective date — gets a panel treatment to anchor the page. */
    .page > ul:first-of-type {
      background: var(--surface);
      border: 1px solid var(--neon-line);
      border-radius: 12px;
      padding: 18px 22px 18px 40px;
      margin: 24px 0 32px;
    }

    .meta {
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--fg-muted);
      letter-spacing: 1px;
      margin: 0 0 32px;
    }
    .meta strong { color: var(--fg); }

    .footer {
      margin-top: 72px;
      padding-top: 24px;
      border-top: 1px solid var(--neon-line);
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--fg-faint);
      text-align: center;
    }
    .footer a {
      color: var(--fg-muted);
      border-bottom: none;
    }
    .footer a:hover { color: var(--neon); }

    /* Skip-to-content — invisible until a keyboard user tabs into it.
       WCAG 2.4.1 bypass-blocks; lets screen-reader / keyboard users jump
       straight to the article past the trail and nav. */
    .skip-link {
      position: absolute;
      left: 16px;
      top: -100px;
      background: var(--surface);
      color: var(--neon);
      padding: 10px 16px;
      border: 1px solid var(--neon);
      border-radius: 6px;
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 100;
      transition: top 0.15s ease;
    }
    .skip-link:focus { top: 16px; outline: none; }

    /* Explicit neon focus ring for keyboard users — the browser default
       is invisible against the dark background. :focus-visible only
       triggers for keyboard focus, so mouse clicks don't get a ring. */
    a:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--neon);
      outline-offset: 3px;
      border-radius: 2px;
    }

    @media (max-width: 600px) {
      .page { padding: 32px 18px 64px; }
      h1 { font-size: 22px; letter-spacing: 3px; }
      h2 { font-size: 12px; }
      .nav { flex-direction: column; align-items: flex-start; gap: 14px; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>
  <div class="trail" aria-hidden="true">
    <div class="comet"></div>
  </div>
  <div class="page">
    <nav class="nav">
      <a href="/" class="wordmark">Say<span class="accent">verse</span></a>
      <div class="nav-links">
        <a href="/privacy/">Privacy</a>
        <a href="https://github.com/ozadovskyi/Sayverse">GitHub</a>
      </div>
    </nav>

    <main id="content">
      {{ content }}
    </main>

    <div class="footer">
      Sayverse · <a href="https://github.com/ozadovskyi/Sayverse">github.com/ozadovskyi/Sayverse</a>
    </div>
  </div>
</body>
</html>
