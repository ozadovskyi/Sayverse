name: Native E2E tests

# The Maestro native layer covers the microphone voice path the web layer
# cannot. The app is built with the EXPO_PUBLIC_E2E seam (see services/e2e.ts)
# so the run is offline and deterministic — no API key, no real microphone.
#
# Android on a Linux runner: an x86_64 emulator with KVM acceleration is far
# cheaper (×1 vs the ×10 macOS multiplier) and more reliable than an iOS
# simulator on a macOS runner. Manual dispatch only — never scheduled.
#
# NOTE: building an RN app and booting an emulator on CI is environment-
# sensitive; expect to tune this on the first runs.

on:
  workflow_dispatch:

jobs:
  maestro-android:
    name: Maestro Android flows
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Compile the fixture seam into the bundle — the voice flow runs offline.
      EXPO_PUBLIC_E2E: '1'
      # Build native code for the emulator's ABI only. A universal 4-ABI build
      # is ~4x slower and was failing on the arm64-v8a native compile we never
      # need here. `ORG_GRADLE_PROJECT_*` overrides the generated gradle.properties.
      ORG_GRADLE_PROJECT_reactNativeArchitectures: x86_64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: npm ci

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build the app and run Maestro on an emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            # Build explicitly rather than via `expo run:android`: that wrapper
            # passes Gradle `--configure-on-demand`, which breaks the task
            # ordering so the app's CMake configures before the dependency
            # libraries' codegen has generated its JNI sources.
            npx expo prebuild --platform android --no-install
            (cd android && ./gradlew :app:assembleRelease -x lint -x test)
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            maestro test tests/native --format junit --output maestro-report.xml

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: maestro-report
          path: maestro-report.xml
          retention-days: 14
