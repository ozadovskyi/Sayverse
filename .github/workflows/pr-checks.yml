name: PR checks

# The merge gate. Everything here is fast, free, deterministic and needs no
# secrets — lint + dead-code, typecheck, and the Jest `unit` + `component`
# projects (the component layer renders React Native Testing Library in Node,
# so no browser or emulator). The LLM-eval and native layers run in their own
# workflows because they cost money / need an emulator.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & dead code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: ESLint
        # The Tailwind plugin validates every NativeWind class against the
        # config — a typo'd class is a hard error, not a silent no-op.
        run: npm run lint
      - name: Dead-code check (knip)
        run: npm run deadcode

  test:
    name: Typecheck, unit & component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit & component tests (Jest)
        run: npm test
