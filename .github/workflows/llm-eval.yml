name: LLM eval

# The LLM-evaluation layer (Jest `llm-eval` project) hits the real OpenAI
# API, so it is non-deterministic and costs money — it must never gate a PR.
# Manual dispatch only: every run spends real API budget, so it is triggered
# deliberately rather than on a schedule. The OPENAI_API_KEY secret lives here
# and nowhere else in CI.

on:
  workflow_dispatch:

jobs:
  llm-eval:
    name: LLM evaluation suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run LLM eval
        run: npm run eval -- --json --outputFile=llm-eval-report.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Upload eval report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: llm-eval-report
          path: llm-eval-report.json
          retention-days: 30
