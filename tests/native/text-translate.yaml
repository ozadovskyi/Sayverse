# Typed-text translation — a native interaction flow.
#
# Exercises the single-shot typed-text path on the native layer: type into the
# field, translate, see the result. With the EXPO_PUBLIC_E2E seam the
# translation is the canned fixture, so the assertion is deterministic.
appId: com.ozadovskyi.opentranslator
name: Typed-text translation
---
- launchApp:
    clearState: true
- runFlow: flows/enter-api-key.yaml

- tapOn:
    id: "text-input-field"
- inputText: "Hola"
- hideKeyboard
- tapOn:
    id: "text-input-translate-button"

- assertVisible:
    id: "translation-translated-text"
- assertVisible: "Привет, где находится железнодорожная станция?"
